name: CI — Build, Lint & Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "20"

jobs:
  # ─── Go Backend ────────────────────────────────────────
  backend:
    name: Go Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: observeid
          POSTGRES_USER: observeid
          POSTGRES_PASSWORD: observeid
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U observeid
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      neo4j:
        image: neo4j:5-enterprise
        env:
          NEO4J_AUTH: neo4j/observeid123
          NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
        ports:
          - 7687:7687
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.1"

      - name: Generate Protobuf
        run: make proto

      - name: Vendor Dependencies
        run: cd backend && go mod tidy

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend

      - name: Vet
        run: cd backend && go vet ./...

      - name: Build
        run: cd backend && go build ./...

      - name: Test
        run: cd backend && go test -v -race -count=1 ./...
        env:
          DATABASE_URL: postgresql://observeid:observeid@localhost:5432/observeid?sslmode=disable
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: observeid123

  # ─── Next.js Frontend ─────────────────────────────────
  frontend:
    name: Next.js Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ─── Deliverables ─────────────────────────────────────
  deliverables:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Summarize
        run: |
          echo "## ✅ CI Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend:** Go build, lint, vet, test passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** Next.js build and lint passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Protobuf:** Code generation verified" >> $GITHUB_STEP_SUMMARY
